# Hermes Home Server — Docker Compose
# Данные Hermes монтируются в ./data (соответствует ~/.hermes внутри контейнера)

services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-home
    restart: unless-stopped
    command: ["gateway", "run"]
    volumes:
      - ./data:/opt/data
      - ./backups:/opt/backups
      - ./scripts:/opt/scripts:ro
    env_file:
      - .env
    environment:
      HERMES_HOME: /opt/data
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8642/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
